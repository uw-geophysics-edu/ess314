# Book settings
title: "ESS 314: Introduction to Geophysics"
author: Marine Denolle
copyright: "2026"
logo: _static/ess314-logo.png

# Don't execute notebooks (they may require data downloads)
execute:
  execute_notebooks: off

# Repository information
repository:
  url: https://github.com/uw-geophysics-edu/ess314
  branch: main

# Add GitHub buttons
html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true
  baseurl: https://uw-geophysics-edu.github.io/ess314/
  favicon: _static/ess314-logo.png
  extra_css:
    - _static/css/custom.css

# Launch buttons for students
launch_buttons:
  notebook_interface: jupyterlab
  colab_url: https://colab.research.google.com

# Bibliography
bibtex_bibfiles:
  - references.bib

# Enable search and advanced features
parse:
  myst_enable_extensions:
    - amsmath
    - dollarmath
    - linkify
    - smartquotes
    - substitution

sphinx:
  extra_extensions:
    - sphinxcontrib.bibtex
  config:
    bibtex_reference_style: author_year
    bibtex_default_style: plain
    exclude_patterns:
      - ".pixi/**"
      - ".venv/**"
      - "_build/**"
      - "**/.ipynb_checkpoints/**"
      - "**/node_modules/**"
      - "Lab1/**"
