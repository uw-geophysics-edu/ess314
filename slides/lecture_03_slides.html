<h1 id="elastic-deformation-the-key-assumption">Elastic Deformation: The Key Assumption</h1>
<p><strong>Elastic</strong> = material returns to its original shape after stress is removed</p>
<p><strong>Linear elastic (Hookean)</strong> = stress ∝ strain</p>
<div class="callout">
Seismic strains are ~10⁻⁷ — far inside the Hookean regime.
Fault zones, magma chambers, and the deep Earth are exceptions.
</div>
