<h1 id="scale-diagram-scale-determines-method">Scale Diagram: Scale Determines Method</h1>
<p><img src="../assets/figures/fig_space_time_scales.png" alt="" style="width:900px;" /></p>
<p><strong>Key point:</strong> No single instrument spans 15 orders of magnitude in time and 10 in space. The scale of the process dictates the appropriate method.</p>
</section>

<h1 id="three-insights-from-the-scale-diagram">Three Insights from the Scale Diagram</h1>
<p><strong>1. Same material, different physics</strong></p>
<ul>
<li>Mantle = elastic solid on seismic timescales (seconds)</li>
<li>Mantle = viscous fluid on convection timescales (millions of years)</li>
<li>Which description applies depends on the ratio of observation time to material relaxation time</li>
</ul>
<p><strong>2. Scale dictates resolution</strong></p>
<ul>
<li>A seismometer measuring arrivals in seconds cannot sense million-year flow</li>
<li>A continental gravity survey cannot resolve a 10-cm void in concrete</li>
</ul>
<p><strong>3. Gap distance and non-uniqueness</strong></p>
<ul>
<li>The further an observable is from the process of interest, the more assumptions are needed to connect them — and the more non-unique the inference</li>
</ul>
<p><strong>Key point:</strong> Before choosing a method, identify the spatial and temporal scale of the target process.</p>
</section>

<h1 id="what-seismometers-actually-record">What Seismometers Actually Record</h1>
<p>A seismometer measures <strong>ground velocity</strong> (or displacement/acceleration) as a function of time.</p>
<p>Every seismogram entangles:</p>
<ol>
<li><strong>Source</strong> — the earthquake's rupture history and radiation pattern</li>
<li><strong>Path</strong> — modifications from Earth's heterogeneous velocity structure</li>
<li><strong>Site</strong> — amplification or attenuation by local geology</li>
</ol>
<p>Separating these three contributions is itself an inverse problem.</p>
<p>Frequency range: 0.003 Hz (Earth free oscillations, ~300 s) to 50+ Hz (local microseismicity)</p>
<p><strong>Key point:</strong> A seismogram is not a direct recording of the earthquake — it is a convolution of source, path, and site effects. Every interpretation requires a model for at least two of these three.</p>
</section>

<h1 id="gps-and-insar-measuring-surface-deformation">GPS and InSAR: Measuring Surface Deformation</h1>
<p><strong>GPS (continuous):</strong></p>
<ul>
<li>Position accuracy: millimeters in 3D</li>
<li>Time series: daily to sub-hourly at fixed stations</li>
<li>Captures: interseismic strain (1–10 mm/yr), coseismic displacement (cm–m), postseismic relaxation, volcanic inflation, glacial rebound</li>
</ul>
<p><strong>InSAR (spatially dense snapshots):</strong></p>
<ul>
<li>Satellite radar phase difference between two acquisitions → displacement map</li>
<li>Covers: thousands of km² at cm–mm precision</li>
<li>Limitation: line-of-sight only; temporal aliasing possible</li>
</ul>
<p><strong>Key point:</strong> GPS gives continuous time series at points; InSAR gives spatially dense maps at moments. Both are passive — the signal source is satellite navigation or microwave radar, not the Earth.</p>
</section>

</path></g></g><g data-mml-node="mo" transform="translate(904,0)"><path data-c="28" d="M94 250Q94 319 104 381T127 488T164 576T202 643T244 695T277 729T302 750H315H319Q333 750 333 741Q333 738 316 720T275 667T226 581T184 443T167 250T184 58T225 -81T274 -167T316 -220T333 -241Q333 -250 318 -250H315H302L274 -226Q180 -141 137 -14T94 250Z"></path></g><g data-mml-node="TeXAtom" data-mjx-texclass="ORD" transform="translate(1293,0)"><g data-mml-node="mi"><path data-c="1D426" d="M40 442Q217 450 218 450H224V365Q226 367 235 378T254 397T278 416T314 435T362 448Q376 450 400 450H406Q503 450 534 393Q545 376 545 370Q545 368 555 379Q611 450 716 450Q774 450 809 434Q850 414 861 379T873 276V213V198V62H942V0H933Q915 3 809 3Q702 3 684 0H675V62H744V194V275Q744 348 735 373T690 399Q645 399 607 370T557 290Q555 281 554 171V62H623V0H614Q596 3 489 3Q374 3 365 0H356V62H425V194V275Q425 348 416 373T371 399Q326 399 288 370T238 290Q236 281 235 171V62H304V0H295Q277 3 171 3Q64 3 46 0H37V62H106V210V303Q106 353 104 363T91 376Q77 380 50 380H37V442H40Z"></path></g></g><g data-mml-node="mo" transform="translate(2251,0)"><path data-c="29" d="M60 749L64 750Q69 750 74 750H86L114 726Q208 641 251 514T294 250Q294 182 284 119T261 12T224 -76T186 -143T145 -194T113 -227T90 -246Q87 -249 86 -250H74Q66 -250 63 -250T58 -247T55 -238Q56 -237 66 -225Q221 -64 221 250T66 725Q56 737 55 738Q55 746 60 749Z"></path></g><g data-mml-node="mo" transform="translate(2917.8,0)"><path data-c="2248" d="M55 319Q55 360 72 393T114 444T163 472T205 482Q207 482 213 482T223 483Q262 483 296 468T393 413L443 381Q502 346 553 346Q609 346 649 375T694 454Q694 465 698 474T708 483Q722 483 722 452Q722 386 675 338T555 289Q514 289 468 310T388 357T308 404T224 426Q164 426 125 393T83 318Q81 289 69 289Q55 289 55 319ZM55 85Q55 126 72 159T114 210T163 238T205 248Q207 248 213 248T223 249Q262 249 296 234T393 179L443 147Q502 112 553 112Q609 112 649 141T694 220Q694 249 708 249T722 217Q722 153 675 104T555 55Q514 55 468 76T388 123T308 170T224 192Q164 192 125 159T83 84Q80 55 69 55Q55 55 55 85Z"></path></g><g data-mml-node="TeXAtom" data-mjx-texclass="ORD" transform="translate(3973.6,0)"><g data-mml-node="mi"><path data-c="1D41D" d="M351 686L442 690Q533 694 534 694H540V389Q540 327 540 253T539 163Q539 97 541 83T555 66Q569 62 596 62H609V31Q609 0 608 0Q588 0 510 -3T412 -6Q411 -6 411 16V38L401 31Q337 -6 265 -6Q159 -6 99 58T38 224Q38 265 51 303T92 375T165 429T272 449Q359 449 417 412V507V555Q417 597 415 607T402 620Q388 624 361 624H348V686H351ZM411 350Q362 399 291 399Q278 399 256 392T218 371Q195 351 189 320T182 238V221Q182 179 183 159T191 115T212 74Q241 46 288 46Q358 46 404 100L411 109V350Z"></path></g></g></g></g></svg></mjx-container></p>
<p>This is <strong>almost always non-unique</strong> — many models fit the same data within measurement uncertainty.</p>
<p><strong>Gravity example:</strong></p>
<ul>
<li>Deeper, denser body <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> shallower, less-dense body → identical surface <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.464ex;" xmlns="http://www.w3.org/2000/svg" width="1.079ex" height="1.464ex" role="img" focusable="false" viewBox="0 -442 477 647"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D454" d="M311 43Q296 30 267 15T206 0Q143 0 105 45T66 160Q66 265 143 353T314 442Q361 442 401 394L404 398Q406 401 409 404T418 412T431 419T447 422Q461 422 470 413T480 394Q480 379 423 152T363 -80Q345 -134 286 -169T151 -205Q10 -205 10 -137Q10 -111 28 -91T74 -71Q89 -71 102 -80T116 -111Q116 -121 114 -130T107 -144T99 -154T92 -162L90 -164H91Q101 -167 151 -167Q189 -167 211 -155Q234 -144 254 -122T282 -75Q288 -56 298 -13Q311 35 311 43ZM384 328L380 339Q377 350 375 354T369 368T359 382T346 393T328 402T306 405Q262 405 221 352Q191 313 171 233T151 117Q151 38 213 38Q269 38 323 108L331 118L384 328Z"></path></g></g></g></svg></mjx-container></li>
<li>Solution requires additional constraints: drill data, geological knowledge, density bounds</li>
</ul>
<p><strong>Tomography example:</strong></p>
<ul>
<li>Velocity anomalies smear along ray paths</li>
<li>Resolution uneven where earthquakes or stations are sparse</li>
</ul>
<p>Non-uniqueness is <strong>not a failure</strong> — it is a statement about what the data actually constrain.</p>
<p><strong>Key point:</strong> Every geophysical inference requires additional constraints beyond the data alone. Characterizing what those constraints are, and what they imply, is the geophysicist's core scientific task.</p>
</section>

<h1 id="three-pillars-of-geophysical-science">Three Pillars of Geophysical Science</h1>
<div class="columns">
<div>
<p><strong>Theory &amp; Computation</strong></p>
<ul>
<li>Derive governing equations</li>
<li>Solve numerically for realistic geometries</li>
<li>SPECFEM3D, ASPECT (open source)</li>
</ul>
<p><strong>Field Observations</strong></p>
<ul>
<li>Deploy instruments, collect data</li>
<li>CASIE21: active airguns + passive OBS on Cascadia margin</li>
<li>PNSN: continuous Pacific Northwest monitoring</li>
</ul>
</div>
<div>
<p><strong>Laboratory Experiments</strong></p>
<ul>
<li>Measure rock properties under pressure and temperature</li>
<li>Diamond-anvil cells → lower mantle pressures</li>
<li>Links tomographic images to real mineralogy</li>
</ul>
<p><strong>No pillar is sufficient alone.</strong> Theory without observation is speculation. Observation without theory is cataloguing. Lab data without field context is unanchored.</p>
</div>
</div>
<p><strong>Key point:</strong> Geophysics advances through integration of all three modes — each constrains the others.</p>
</section>

<ol>
<li>
<p>A seismic reflection survey images a bright flat reflector at 2-second two-way travel time. What assumptions are embedded in concluding this is a sedimentary layer boundary? Name two that could be tested.</p>

/g></g></g></svg></mjx-container>, and what is <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.023ex;" xmlns="http://www.w3.org/2000/svg" width="2.045ex" height="1.6ex" role="img" focusable="false" viewBox="0 -697 904 707"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="TeXAtom" data-mjx-texclass="ORD"><g data-mml-node="mi"><path data-c="1D406" d="M465 -10Q281 -10 173 88T64 343Q64 413 85 471T143 568T217 631T298 670Q371 697 449 697Q452 697 459 697T470 696Q502 696 531 690T582 675T618 658T644 641T656 632L732 695Q734 697 745 697Q758 697 761 692T765 668V627V489V449Q765 428 761 424T741 419H731H724Q705 419 702 422T695 444Q683 520 631 577T495 635Q364 635 295 563Q261 528 247 477T232 343Q232 296 236 260T256 185T296 120T366 76T472 52Q481 51 498 51Q544 51 573 67T607 108Q608 111 608 164V214H464V276H479Q506 273 680 273Q816 273 834 276H845V214H765V113V51Q765 16 763 8T750 0Q742 2 709 16T658 40L648 46Q592 -10 465 -10Z"></path></g></g></g></g></svg></mjx-container>?</p>
</li>

<h1 id="summary-lecture-2-key-takeaways">Summary: Lecture 2 Key Takeaways</h1>
<ul>
<li>The Kola Borehole (12 km) penetrated 0.19% of Earth's radius — everything deeper is from geophysical inference</li>
<li><strong>Scale determines method</strong>: no single technique spans 10–15 orders of magnitude in space and time</li>
<li>The same material (mantle) is elastic on seismic timescales and viscous on convection timescales</li>
