<h1 id="what-does-a-seismogram-record">What Does a Seismogram Record?</h1>
<p>A Cascadia earthquake signal at a Seattle station arrives in three distinct bursts:</p>
<table>
<thead>
<tr>
<th>Arrival</th>
<th>Wave type</th>
<th>Travel time</th>
<th>Character</th>
</tr>
</thead>
<tbody>
<tr>
<td>First</td>
<td>P-wave</td>
<td>~90 s</td>
<td>Sharp, vertical motion</td>
</tr>
<tr>
<td>Second</td>
<td>S-wave</td>
<td>~140 s</td>
<td>Larger, transverse</td>
</tr>
<tr>
<td>Third</td>
<td>Surface waves</td>
<td>~300 s</td>
<td>Long, rolling</td>
</tr>
</tbody>
</table>
<p><strong>Why different wave types? Why different speeds?</strong></p>
<p>→ The Helmholtz decomposition of the 3D wave equation produces two independent families</p>
</section>

<p>In any fluid: <strong><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.489ex;" xmlns="http://www.w3.org/2000/svg" width="5.513ex" height="1.995ex" role="img" focusable="false" viewBox="0 -666 2436.6 882"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D707" d="M58 -216Q44 -216 34 -208T23 -186Q23 -176 96 116T173 414Q186 442 219 442Q231 441 239 435T249 423T251 413Q251 401 220 279T187 142Q185 131 185 107V99Q185 26 252 26Q261 26 270 27T287 31T302 38T315 45T327 55T338 65T348 77T356 88T365 100L372 110L408 253Q444 395 448 404Q461 431 491 431Q504 431 512 424T523 412T525 402L449 84Q448 79 448 68Q448 43 455 35T476 26Q485 27 496 35Q517 55 537 131Q543 151 547 152Q549 153 557 153H561Q580 153 580 144Q580 138 575 117T555 63T523 13Q510 0 491 -8Q483 -10 467 -10Q446 -10 429 -4T402 11T385 29T376 44T374 51L368 45Q362 39 350 30T324 12T288 -4T246 -11Q199 -11 153 12L129 -85Q108 -167 104 -180T92 -202Q76 -216 58 -216Z"></path></g><g data-mml-node="mo" transform="translate(880.8,0)"><path data-c="3D" d="M56 347Q56 360 70 367H707Q722 359 722 347Q722 336 708 328L390 327H72Q56 332 56 347ZM56 153Q56 168 72 173H708Q722 163 722 153Q722 140 707 133H70Q56 140 56 153Z"></path></g><g data-mml-node="mn" transform="translate(1936.6,0)"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path></g></g></g></svg></mjx-container></strong> (no resistance to shear)</p>
<p>→ <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.375ex;" xmlns="http://www.w3.org/2000/svg" width="6.687ex" height="1.92ex" role="img" focusable="false" viewBox="0 -683 2955.6 848.6"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msub"><g data-mml-node="mi"><path data-c="1D449" d="M52 648Q52 670 65 683H76Q118 680 181 680Q299 680 320 683H330Q336 677 336 674T334 656Q329 641 325 637H304Q282 635 274 635Q245 630 242 620Q242 618 271 369T301 118L374 235Q447 352 520 471T595 594Q599 601 599 609Q599 633 555 637Q537 637 537 648Q537 649 539 661Q542 675 545 679T558 683Q560 683 570 683T604 682T668 681Q737 681 755 683H762Q769 676 769 672Q769 655 760 640Q757 637 743 637Q730 636 719 635T698 630T682 623T670 615T660 608T652 599T645 592L452 282Q272 -9 266 -16Q263 -18 259 -21L241 -22H234Q216 -22 216 -15Q213 -9 177 305Q139 623 138 626Q133 637 76 637H59Q52 642 52 648Z"></path></g><g data-mml-node="mi" transform="translate(616,-150) scale(0.707)"><path data-c="1D446" d="M308 24Q367 24 416 76T466 197Q466 260 414 284Q308 311 278 321T236 341Q176 383 176 462Q176 523 208 573T273 648Q302 673 343 688T407 704H418H425Q521 704 564 640Q565 640 577 653T603 682T623 704Q624 704 627 704T632 705Q645 705 645 698T617 577T585 459T569 456Q549 456 549 465Q549 471 550 475Q550 478 551 494T553 520Q553 554 544 579T526 616T501 641Q465 662 419 662Q362 662 313 616T263 510Q263 480 278 458T319 427Q323 425 389 408T456 390Q490 379 522 342T554 242Q554 216 546 186Q541 164 528 137T492 78T426 18T332 -20Q320 -22 298 -22Q199 -22 144 33L134 44L106 13Q83 -14 78 -18T65 -22Q52 -22 52 -14Q52 -11 110 221Q112 227 130 227H143Q149 221 149 216Q149 214 148 207T144 186T142 153Q144 114 160 87T203 47T255 29T308 24Z"></path></g></g><g data-mml-node="mo" transform="translate(1399.9,0)"><path data-c="3D" d="M56 347Q56 360 70 367H707Q722 359 722 347Q722 336 708 328L390 327H72Q56 332 56 347ZM56 153Q56 168 72 173H708Q722 163 722 153Q722 140 707 133H70Q56 140 56 153Z"></path></g><g data-mml-node="mn" transform="translate(2455.6,0)"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path></g></g></g></svg></mjx-container> — S-waves don't propagate</p>
<p><strong>Physical reason (not just the formula):</strong></p>
<p>An S-wave requires the medium to spring back from shear distortion. In a fluid, molecules flow and rearrange instead of storing elastic shear energy.</p>
<div class="warning">
S-wave shadow zone → liquid outer core: no S-waves through Earth's core
Water table: S-waves reflect at water-saturated layer (V_S drops sharply)
Magma chamber: S-wave attenuation → bright reflector in imaging
</div>

<h1 id="s-wave-polarizations">S-wave Polarizations</h1>
<p><strong>SV</strong> — particle motion in the <em>vertical</em> plane containing the ray</p>
<p><strong>SH</strong> — particle motion <em>horizontal</em>, perpendicular to the ray</p>
<p>Both travel at <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.375ex;" xmlns="http://www.w3.org/2000/svg" width="2.539ex" height="1.92ex" role="img" focusable="false" viewBox="0 -683 1122.1 848.6"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msub"><g data-mml-node="mi"><path data-c="1D449" d="M52 648Q52 670 65 683H76Q118 680 181 680Q299 680 320 683H330Q336 677 336 674T334 656Q329 641 325 637H304Q282 635 274 635Q245 630 242 620Q242 618 271 369T301 118L374 235Q447 352 520 471T595 594Q599 601 599 609Q599 633 555 637Q537 637 537 648Q537 649 539 661Q542 675 545 679T558 683Q560 683 570 683T604 682T668 681Q737 681 755 683H762Q769 676 769 672Q769 655 760 640Q757 637 743 637Q730 636 719 635T698 630T682 623T670 615T660 608T652 599T645 592L452 282Q272 -9 266 -16Q263 -18 259 -21L241 -22H234Q216 -22 216 -15Q213 -9 177 305Q139 623 138 626Q133 637 76 637H59Q52 642 52 648Z"></path></g><g data-mml-node="mi" transform="translate(616,-150) scale(0.707)"><path data-c="1D446" d="M308 24Q367 24 416 76T466 197Q466 260 414 284Q308 311 278 321T236 341Q176 383 176 462Q176 523 208 573T273 648Q302 673 343 688T407 704H418H425Q521 704 564 640Q565 640 577 653T603 682T623 704Q624 704 627 704T632 705Q645 705 645 698T617 577T585 459T569 456Q549 456 549 465Q549 471 550 475Q550 478 551 494T553 520Q553 554 544 579T526 616T501 641Q465 662 419 662Q362 662 313 616T263 510Q263 480 278 458T319 427Q323 425 389 408T456 390Q490 379 522 342T554 242Q554 216 546 186Q541 164 528 137T492 78T426 18T332 -20Q320 -22 298 -22Q199 -22 144 33L134 44L106 13Q83 -14 78 -18T65 -22Q52 -22 52 -14Q52 -11 110 221Q112 227 130 227H143Q149 221 149 216Q149 214 148 207T144 186T142 153Q144 114 160 87T203 47T255 29T308 24Z"></path></g></g></g></g></svg></mjx-container> but interact differently with boundaries:</p>
<ul>
<li><strong>SV</strong> converts to P at interfaces (mode conversion)</li>

<h1 id="surface-waves-trapped-at-the-free-surface">Surface Waves: Trapped at the Free Surface</h1>
<p>Boundary condition at Earth's surface: zero traction</p>
<p>→ New solutions that decay exponentially with depth and travel along the surface</p>

</tr>

<tr>

<h1 id="huygens-principle">Huygens' Principle</h1>
<blockquote>
<p>Every point on a wavefront is a new <strong>point source</strong> of secondary spherical wavelets</p>
<p>The new wavefront = envelope (tangent surface) of all secondary wavelets</p>
</blockquote>
<p>This is not just geometry — it is the Green's function representation of the wave equation.</p>
<p><strong>It explains:</strong></p>
<ul>
<li>Why plane waves stay plane in a homogeneous medium</li>
<li>Why wavefronts <em>bend</em> (refract) at a velocity contrast</li>
<li>Why seismic energy <em>spreads</em> (geometrical spreading)</li>
</ul>
</section>

<h1 id="ai-literacy-machine-learning-phase-picking">AI Literacy: Machine-Learning Phase Picking</h1>
<p>PhaseNet, EQTransformer: deep learning models that auto-pick P and S arrivals</p>
<p>They exploit the <em>same physics</em>:</p>
<ul>
<li>P arrives first (vertical motion)</li>
<li>S arrives ~73% later with transverse motion</li>
<li>Waveform envelope shape differs between P and S</li>
</ul>
<p><strong>Epistemics prompt:</strong></p>
<blockquote>
<p><em>&quot;A phase picker labels an arrival as P with 97% confidence, but it appears only on horizontal components. Is this consistent with P-wave physics? What could explain it?&quot;</em></p>
</blockquote>
<p>Evaluate: Does the AI flag the tension? Suggest alternative explanations (steep incidence, mode conversion, instrument issue)?</p>
