name: Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          cache: true
          frozen: true

      - name: Setup Node.js (for Marp)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Compile Marp slide decks → HTML
        run: marp --html --allow-local-files --theme slides/ess314.css --output-dir slides/ slides/*_slides.md

      - name: Compile Marp slide decks → PDF
        run: marp --pdf  --allow-local-files --theme slides/ess314.css --output-dir slides/ slides/*_slides.md
        continue-on-error: true   # PDF requires Chrome; skip gracefully if unavailable

      - name: Build book
        run: pixi run build-ci

      - name: Copy slides and figures into website/
        run: |
          mkdir -p website/slides website/assets
          cp slides/*.html website/slides/
          cp slides/*.pdf  website/slides/ 2>/dev/null || true
          cp -r assets/figures website/assets/

      - name: Linkcheck
        continue-on-error: true
        run: pixi run linkcheck

      - name: Check website directory
        run: |
          ls -la website/
          du -sh website/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'website'

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
