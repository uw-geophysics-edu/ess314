[workspace]
name = "ess314-geophysics"
version = "0.1.0"
description = "ESS 314: Introduction to Geophysics — the first open-source geophysics course book"
authors = ["Marine Denolle <marinedenolle@uw.edu>"]
channels = ["conda-forge"]
platforms = ["osx-64", "osx-arm64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
jupyter = ">=1.0"
jupyterlab = ">=3.0"
jupyter-book = ">=1.0,<2"
sphinxcontrib-bibtex = ">=2.5"
ipykernel = ">=6.0"
matplotlib = ">=3.5"
numpy = ">=1.20"
scipy = ">=1.7"
pandas = ">=1.3"

[pypi-dependencies]

[feature.dev]
dependencies = { black = ">=22.0", pre-commit = "*", codespell = "*" }

[tasks]
# Student tasks
lab = "jupyter lab"
notebook = "jupyter notebook"

# Book building tasks
build-book = "jupyter book build ."
build-ci = "jupyter book build . && rm -rf website && mv _build/html website"
serve-book = "python -m http.server --directory _build/html 8000"
serve-all = "python -m http.server --directory website/ 3000"
clean = "rm -rf _build website"

# Validation tasks
spellcheck = "codespell --skip './_build,./website,pixi.lock,*.ipynb,*.js,*.css,*.map,*.svg,*.pdf,*.png,*.jpg' --ignore-words-list='hist,nd,te,ba'"
linkcheck = "jupyter-book build --builder linkcheck ."

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
